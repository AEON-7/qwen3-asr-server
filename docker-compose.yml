# OpenAI-compatible /v1/audio/transcriptions endpoint —
# Qwen3-ASR-0.6B served by vLLM on a shared Docker bridge.
#
# RTF on DGX Spark (sm_121a, hot path): ~16x real-time, 120ms for a 2s clip.
#
# Designed to share a Docker bridge with a vLLM main + a Qwen3-TTS sidecar
# so the audio pipeline never leaves the host. To use:
#   docker network create aeon-stack    # one-time, if not already created
#   docker compose up -d
services:
  qwen3-asr:
    image: ghcr.io/aeon-7/qwen3-asr-server:latest
    container_name: qwen3-asr
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - ENABLE_NVFP4_SM100=0
      - VLLM_TEST_FORCE_FP8_MARLIN=1
      - VLLM_USE_FLASHINFER_SAMPLER=1
      # - HF_TOKEN=...   # only needed for gated repos
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    networks:
      - aeon-stack
    ports:
      - "8001:8001"
    shm_size: "4gb"
    restart: unless-stopped
    # Opt into autoheal-driven restart on healthcheck failure (see autoheal
    # service block below). Comment this out if you don't run autoheal.
    labels:
      - "autoheal=true"
    # Override CMD here to pick a different model / tune memory:
    # command:
    #   - vllm
    #   - serve
    #   - Qwen/Qwen3-ASR-1.7B
    #   - --served-model-name=qwen3-asr
    #   - --host=0.0.0.0
    #   - --port=8001
    #   - --gpu-memory-utilization=0.16
    #   - --max-model-len=8192
    #   - --max-num-seqs=4
    #   - --trust-remote-code
    # Healthcheck baked into the Dockerfile probes /v1/models (only returns
    # 200 once vLLM has actually loaded the model — /health alone returns
    # 200 before the model is ready). You can override here:
    # healthcheck:
    #   test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/v1/models', timeout=4)"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 120s

  # ── Optional watchdog ────────────────────────────────────────────────────
  # Docker's `restart: unless-stopped` only restarts on container CRASH,
  # not on healthcheck failure. To get auto-restart when the ASR endpoint
  # goes unhealthy (model unloaded, GPU stalled, port listening but engine
  # wedged), run `willfarrell/autoheal` alongside. It watches every container
  # labeled `autoheal=true` (above) and `docker restart`s any that report
  # an unhealthy status.
  #
  # Comment out the entire autoheal service block if you'd rather manage
  # restarts via systemd, k8s liveness probes, or external monitoring.
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: aeon-autoheal
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal      # only touch labeled containers
      - AUTOHEAL_INTERVAL=30                   # check every 30 s
      - AUTOHEAL_START_PERIOD=180              # ignore failures during cold start
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=20       # SIGKILL grace period
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Doesn't need to join aeon-stack — talks to the docker daemon directly.

networks:
  aeon-stack:
    external: true
